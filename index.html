
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Fitness Tracker</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<body>

<div class="hero">
    <h1>Luxury Fitness Tracker</h1>
    <p>Контроль. Дисциплина. Прогресс.</p>
</div>

<div class="container">

    <div class="block" data-block="foundation1">
        <h2>Foundation Session I</h2>
        <div class="progress-bar"><div class="progress"></div></div>

        <div class="exercise" data-id="f1-1"><input type="checkbox"> Goblet Squat</div>
        <div class="exercise" data-id="f1-2"><input type="checkbox"> Lat Pulldown</div>
        <div class="exercise" data-id="f1-3"><input type="checkbox"> Dumbbell Press</div>
        <div class="exercise" data-id="f1-4"><input type="checkbox"> Dumbbell Row</div>
        <div class="exercise" data-id="f1-5"><input type="checkbox"> Step-Up</div>

    </div>

</div>

<script src="app.js"></script>
</body>
</html>
